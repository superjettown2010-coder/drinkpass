<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrinkPass — お客様画面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0a0a0f;
    color: #f0f0f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.5s ease;
  }

  body.ok { background: #021a0f; }
  body.ng { background: #1a0206; }

  /* 背景パルス */
  .bg-pulse {
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    border-radius: 50%;
    transform: scale(0);
  }
  .bg-pulse.active {
    animation: bgPulse 0.6s ease-out forwards;
  }
  .bg-pulse.ok { background: radial-gradient(circle, rgba(0,229,160,0.25) 0%, transparent 70%); }
  .bg-pulse.ng { background: radial-gradient(circle, rgba(255,59,92,0.25) 0%, transparent 70%); }
  @keyframes bgPulse {
    0%   { opacity:1; transform:scale(0); }
    100% { opacity:0; transform:scale(3); }
  }

  /* メイン表示エリア */
  .display-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 24px;
    text-align: center;
    width: 100%;
  }

  /* 判定マーク */
  .mark {
    font-size: clamp(120px, 30vw, 240px);
    line-height: 1;
    opacity: 0;
    transform: scale(0.3);
    transition: none;
    filter: drop-shadow(0 0 40px currentColor);
  }
  .mark.show {
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(0.3) rotate(-10deg); }
    60%  { opacity:1; transform:scale(1.15) rotate(3deg); }
    100% { opacity:1; transform:scale(1) rotate(0deg); }
  }
  .mark.ok { color: #00e5a0; }
  .mark.ng { color: #ff3b5c; }

  /* メッセージ */
  .message {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 7vw, 64px);
    font-weight: 800;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(20px);
    transition: none;
  }
  .message.show {
    animation: slideUp 0.4s ease 0.15s forwards;
  }
  @keyframes slideUp {
    to { opacity:1; transform:translateY(0); }
  }
  .message.ok { color: #00e5a0; }
  .message.ng { color: #ff3b5c; }

  /* サブメッセージ */
  .submsg {
    font-size: clamp(16px, 4vw, 28px);
    color: rgba(240,240,248,0.7);
    opacity: 0;
    transform: translateY(10px);
    transition: none;
  }
  .submsg.show {
    animation: slideUp 0.4s ease 0.25s forwards;
  }

  /* 残り枚数 */
  .remaining {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 32px;
    opacity: 0;
    transform: translateY(10px);
    transition: none;
  }
  .remaining.show {
    animation: slideUp 0.4s ease 0.35s forwards;
  }
  .remaining-label {
    font-size: 13px;
    color: rgba(240,240,248,0.5);
    margin-bottom: 4px;
  }
  .remaining-value {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 8vw, 60px);
    font-weight: 800;
    color: #f0f0f8;
  }
  .remaining-unit {
    font-size: 16px;
    color: rgba(240,240,248,0.6);
    margin-left: 4px;
  }

  /* 待機画面 */
  .standby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .standby-logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 10vw, 80px);
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .standby-logo span { color: #00e5a0; }
  .standby-sub {
    font-size: clamp(14px, 3vw, 20px);
    color: rgba(240,240,248,0.4);
    letter-spacing: 0.05em;
  }
  .standby-pulse {
    width: 12px; height: 12px;
    background: #00e5a0;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:0.3; transform:scale(1); }
    50%      { opacity:1;   transform:scale(1.4); }
  }

  /* 結果画面 */
  .result { display: none; width: 100%; }
  .result.active { display: flex; }

  /* ロゴ（常時表示） */
  .corner-logo {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: rgba(240,240,248,0.2);
  }
  .corner-logo span { color: rgba(0,229,160,0.4); }
</style>
</head>
<body>

<div class="bg-pulse" id="bgPulse"></div>

<!-- 待機画面 -->
<div class="standby" id="standby">
  <div class="standby-logo">Drink<span>Pass</span></div>
  <div class="standby-sub">QRコードをスキャンしてください</div>
  <div class="standby-pulse"></div>
</div>

<!-- 結果画面 -->
<div class="display-wrap result" id="result">
  <div class="mark" id="mark"></div>
  <div class="message" id="message"></div>
  <div class="submsg" id="submsg"></div>
  <div class="remaining" id="remaining">
    <div class="remaining-label">残り利用回数</div>
    <div><span class="remaining-value" id="remainVal">—</span><span class="remaining-unit">回</span></div>
  </div>
</div>

<div class="corner-logo">Drink<span>Pass</span></div>

<script>
// ===== メッセージ設定 =====
var MESSAGES = {
  ok:        'ご利用ありがとうございます',
  ng_used:   'すでに使用済みです',
  ng_invalid:'このQRは無効です'
};

// ===== 状態管理 =====
var currentState = 'standby';
var lastTimestamp = null;

// ===== 画面切り替え =====
function showStandby() {
  currentState = 'standby';
  document.body.className = '';
  document.getElementById('standby').style.display = 'flex';
  document.getElementById('result').classList.remove('active');
}

function showResult(data) {
  currentState = 'result';
  var isOK = data.result === 'OK';
  var cls = isOK ? 'ok' : 'ng';

  document.body.className = cls;
  document.getElementById('standby').style.display = 'none';

  // 背景パルス
  var pulse = document.getElementById('bgPulse');
  pulse.className = 'bg-pulse ' + cls;
  void pulse.offsetWidth; // reflow
  pulse.classList.add('active');

  // マーク
  var mark = document.getElementById('mark');
  mark.className = 'mark ' + cls;
  mark.textContent = isOK ? '◎' : '✕';
  void mark.offsetWidth;
  mark.classList.add('show');

  // メッセージ
  var msg = document.getElementById('message');
  msg.className = 'message ' + cls;
  if (isOK) {
    msg.textContent = MESSAGES.ok;
  } else if (data.note === '使用済み') {
    msg.textContent = MESSAGES.ng_used;
  } else {
    msg.textContent = MESSAGES.ng_invalid;
  }
  void msg.offsetWidth;
  msg.classList.add('show');

  // サブメッセージ
  var sub = document.getElementById('submsg');
  sub.className = 'submsg';
  sub.textContent = isOK ? data.id : '';
  void sub.offsetWidth;
  sub.classList.add('show');

  // 残り枚数
  var remEl = document.getElementById('remaining');
  if (isOK && data.remaining !== undefined) {
    remEl.className = 'remaining';
    document.getElementById('remainVal').textContent = data.remaining;
    void remEl.offsetWidth;
    remEl.classList.add('show');
  } else {
    remEl.className = 'remaining'; // 非表示（アニメなし）
    remEl.style.opacity = '0';
  }

  document.getElementById('result').classList.add('active');
}

// ===== LocalStorageを監視（スタッフ画面からの通知を受信）=====
window.addEventListener('storage', function(e) {
  if (e.key !== 'drinkpass_result') return;
  if (!e.newValue) return;

  try {
    var data = JSON.parse(e.newValue);
    if (data.timestamp === lastTimestamp) return;
    lastTimestamp = data.timestamp;
    showResult(data);
  } catch(err) {}
});

// ===== 同一タブ内テスト用（index.htmlと同じタブで開く場合）=====
window.receiveResult = function(data) {
  showResult(data);
};

// ===== 初期表示 =====
showStandby();
</script>
</body>
</html>
