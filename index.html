<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DrinkPass QR管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --danger: #ff3b5c;
    --text: #f0f0f8;
    --text-muted: #6b6b8a;
    --ok-glow: 0 0 30px rgba(0,229,160,0.4);
    --ng-glow: 0 0 30px rgba(255,59,92,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== TABS ===== */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tab {
    flex: 1;
    padding: 16px 8px;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .page { display: none; padding: 24px 16px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }

  /* ===== HEADER ===== */
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    padding: 20px 16px 0;
    max-width: 600px;
    margin: 0 auto;
  }

  .logo span { color: var(--accent); }

  /* ===== SCANNER PAGE ===== */
  .scan-status {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 24px;
    transition: all 0.3s;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .scan-status.ok {
    border-color: var(--accent);
    box-shadow: var(--ok-glow);
    animation: pulse-ok 0.5s ease;
  }

  .scan-status.ng {
    border-color: var(--danger);
    box-shadow: var(--ng-glow);
    animation: pulse-ng 0.5s ease;
  }

  @keyframes pulse-ok {
    0% { transform: scale(0.97); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  @keyframes pulse-ng {
    0% { transform: translateX(-4px); }
    25% { transform: translateX(4px); }
    50% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }

  .status-icon { font-size: 56px; margin-bottom: 12px; }
  .status-text { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .status-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .qr-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .qr-input:focus { border-color: var(--accent); }
  .qr-input::placeholder { color: var(--text-muted); }

  .btn {
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }

  .hint {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 24px;
  }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
  }

  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .stat-used .stat-value { color: var(--accent); }
  .stat-unused .stat-value { color: var(--text-muted); }
  .stat-total .stat-value { color: var(--accent2); }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b4d8);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* ===== LOG ===== */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .log-list { display: flex; flex-direction: column; gap: 8px; }

  .log-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-dot.ok { background: var(--accent); }
  .log-dot.ng { background: var(--danger); }

  .log-id { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; flex: 1; }
  .log-result { font-size: 12px; font-weight: 700; }
  .log-result.ok { color: var(--accent); }
  .log-result.ng { color: var(--danger); }
  .log-time { font-size: 11px; color: var(--text-muted); }

  /* ===== SETUP PAGE ===== */
  .setup-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .setup-card h3 {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .form-row { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .qr-preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 16px;
  }

  .qr-preview-item {
    background: white;
    border-radius: 6px;
    padding: 4px;
    text-align: center;
  }

  .qr-preview-item canvas { width: 100% !important; height: auto !important; }
  .qr-preview-label { font-size: 8px; color: #333; margin-top: 2px; }

  /* ===== ADMIN PAGE ===== */
  .admin-table-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .admin-table { width: 100%; border-collapse: collapse; }

  .admin-table th {
    background: var(--surface);
    padding: 12px 14px;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .admin-table td {
    padding: 11px 14px;
    font-size: 13px;
    border-top: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
  }

  .badge-used { background: rgba(0,229,160,0.15); color: var(--accent); }
  .badge-unused { background: rgba(107,107,138,0.2); color: var(--text-muted); }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }

  .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 6px;
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    padding: 2px 8px;
    margin-bottom: 16px;
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .reset-btn-wrap { text-align: center; margin-top: 16px; }
</style>
</head>
<body>

<div class="logo">Drink<span>Pass</span></div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('scan')">
    <span class="tab-icon">📷</span>スキャン
  </button>
  <button class="tab" onclick="switchTab('setup')">
    <span class="tab-icon">⚙️</span>発行設定
  </button>
  <button class="tab" onclick="switchTab('admin')">
    <span class="tab-icon">📊</span>管理
  </button>
</div>

<!-- ===== SCAN PAGE ===== -->
<div id="page-scan" class="page active">
  <div class="scan-status" id="scanStatus">
    <div class="status-icon">📷</div>
    <div class="status-text" style="font-size:18px; color: var(--text-muted);">QRコードをスキャン</div>
    <div class="status-sub">カメラまたは手動入力で読み取り</div>
  </div>

  <!-- カメラビュー -->
  <div id="cameraWrap" style="display:none; margin-bottom:16px; position:relative; border-radius:16px; overflow:hidden; background:#000;">
    <video id="cameraVideo" autoplay playsinline muted style="width:100%; display:block; max-height:260px; object-fit:cover;"></video>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
      <div style="width:180px;height:180px;border:2px solid var(--accent);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);"></div>
    </div>
    <button onclick="stopCamera()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;">✕</button>
    <div id="debugOverlay" style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.75);padding:8px 12px;font-size:11px;color:#0f0;font-family:monospace;line-height:1.6;">起動中...</div>
  </div>

  <div class="input-group">
    <input class="qr-input" id="qrInput" placeholder="QR IDを入力（例: EVT-0001）" autocomplete="off" />
    <button class="btn btn-secondary" onclick="startCamera()" title="カメラ起動">📷</button>
    <button class="btn btn-primary" onclick="handleScan()">判定</button>
  </div>
  <p class="hint">※ 📷 ボタンでカメラ起動 → QRを枠内に合わせると自動判定</p>

  <div class="stats-grid">
    <div class="stat-card stat-used">
      <div class="stat-value" id="usedCount">0</div>
      <div class="stat-label">使用済み</div>
    </div>
    <div class="stat-card stat-unused">
      <div class="stat-value" id="unusedCount">0</div>
      <div class="stat-label">未使用</div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">総発行数</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>使用率</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title">直近のスキャン履歴</div>
  <div class="log-list" id="logList">
    <div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div>まだスキャンがありません</div>
    </div>
  </div>
</div>

<!-- ===== SETUP PAGE ===== -->
<div id="page-setup" class="page">
  <div class="tag">STEP 1 — イベント設定</div>

  <div class="setup-card">
    <h3>🎪 イベント情報</h3>
    <div class="form-row">
      <label class="form-label">イベント名</label>
      <input class="form-input" id="eventName" placeholder="例: Summer Party 2025" />
    </div>
    <div class="form-row">
      <label class="form-label">発行枚数</label>
      <input class="form-input" type="number" id="issueCount" placeholder="例: 1000" min="1" max="5000" />
    </div>
    <div class="form-row">
      <label class="form-label">IDプレフィックス</label>
      <input class="form-input" id="idPrefix" placeholder="例: EVT" maxlength="6" />
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="generateQRs()">
      ✦ QRコードを発行する
    </button>
  </div>

  <div class="setup-card" id="previewCard" style="display:none">
    <h3>🔍 発行プレビュー（先頭8枚）</h3>
    <div class="qr-preview-grid" id="qrPreviewGrid"></div>
    <div class="divider"></div>
    <p style="font-size:12px; color: var(--text-muted); text-align:center;">
      印刷データはCSVでエクスポートし、印刷会社に渡してください
    </p>
    <button class="btn btn-secondary" style="width:100%; margin-top:12px;" onclick="exportCSV()">
      📥 CSVエクスポート
    </button>
  </div>
</div>

<!-- ===== ADMIN PAGE ===== -->
<div id="page-admin" class="page">
  <div class="tag">管理画面</div>

  <input class="search-input" id="searchInput" placeholder="🔍 QR IDで検索..." oninput="renderAdminTable()" />

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>QR ID</th>
          <th>ステータス</th>
          <th>使用日時</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
        <tr>
          <td colspan="3">
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <div>発行設定でQRを発行してください</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="reset-btn-wrap">
    <button class="btn btn-danger" onclick="resetAll()">🗑 全データリセット</button>
  </div>
</div>

<script>
// ===== STATE =====
let db = {}; // { qrId: { used: bool, usedAt: string|null } }
let scanLog = [];

// ===== TAB =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'admin') renderAdminTable();
  if (name === 'scan') updateStats();
}

// ===== SCAN =====
document.getElementById('qrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleScan();
});

function handleScan() {
  const id = document.getElementById('qrInput').value.trim().toUpperCase();
  if (!id) return;

  const status = document.getElementById('scanStatus');
  let icon, text, sub, cls;

  if (!db[id]) {
    icon = '❓'; text = '未登録のQR'; sub = id; cls = 'ng';
    addLog(id, 'NG', '未登録');
  } else if (db[id].used) {
    icon = '✕'; text = '使用済み — NG'; sub = `使用日時: ${db[id].usedAt}`;
    cls = 'ng';
    addLog(id, 'NG', '使用済み');
  } else {
    db[id].used = true;
    db[id].usedAt = now();
    icon = '✓'; text = 'OK — ドリンク提供可'; sub = id;
    cls = 'ok';
    addLog(id, 'OK', '');
  }

  status.className = 'scan-status ' + cls;
  status.innerHTML = `<div class="status-icon">${icon}</div>
    <div class="status-text" style="color:${cls==='ok'?'var(--accent)':'var(--danger)'}">${text}</div>
    <div class="status-sub">${sub}</div>`;

  document.getElementById('qrInput').value = '';
  updateStats();

  // Reset status after 3s
  setTimeout(() => {
    status.className = 'scan-status';
    status.innerHTML = `<div class="status-icon">📷</div>
      <div class="status-text" style="font-size:18px;color:var(--text-muted);">QRコードをスキャン</div>
      <div class="status-sub">カメラまたは手動入力で読み取り</div>`;
  }, 3000);
}

function addLog(id, result, note) {
  scanLog.unshift({ id, result, note, time: now() });
  if (scanLog.length > 20) scanLog.pop();
  renderLog();
}

function renderLog() {
  const el = document.getElementById('logList');
  if (scanLog.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div>まだスキャンがありません</div></div>`;
    return;
  }
  el.innerHTML = scanLog.slice(0, 10).map(l => `
    <div class="log-item">
      <div class="log-dot ${l.result.toLowerCase()}"></div>
      <div class="log-id">${l.id}</div>
      <div class="log-result ${l.result.toLowerCase()}">${l.result}${l.note ? ' · ' + l.note : ''}</div>
      <div class="log-time">${l.time}</div>
    </div>
  `).join('');
}

function updateStats() {
  const total = Object.keys(db).length;
  const used = Object.values(db).filter(v => v.used).length;
  const unused = total - used;
  const pct = total ? Math.round(used / total * 100) : 0;

  document.getElementById('usedCount').textContent = used;
  document.getElementById('unusedCount').textContent = unused;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===== SETUP =====
function generateQRs() {
  const name = document.getElementById('eventName').value.trim();
  const count = parseInt(document.getElementById('issueCount').value);
  const prefix = document.getElementById('idPrefix').value.trim().toUpperCase() || 'EVT';

  if (!name) { alert('イベント名を入力してください'); return; }
  if (!count || count < 1) { alert('発行枚数を入力してください'); return; }
  if (count > 5000) { alert('一度に発行できるのは5000枚までです'); return; }

  // Generate DB
  db = {};
  for (let i = 1; i <= count; i++) {
    const id = `${prefix}-${String(i).padStart(4, '0')}`;
    db[id] = { used: false, usedAt: null };
  }

  // Preview
  const grid = document.getElementById('qrPreviewGrid');
  grid.innerHTML = '';
  const preview = Object.keys(db).slice(0, 8);

  preview.forEach(id => {
    const wrap = document.createElement('div');
    wrap.className = 'qr-preview-item';
    const qrDiv = document.createElement('div');
    const label = document.createElement('div');
    label.className = 'qr-preview-label';
    label.textContent = id;
    wrap.appendChild(qrDiv);
    wrap.appendChild(label);
    grid.appendChild(wrap);

    new QRCode(qrDiv, {
      text: id,
      width: 72,
      height: 72,
      colorDark: '#000',
      colorLight: '#fff',
    });
  });

  document.getElementById('previewCard').style.display = 'block';
  updateStats();
  alert(`✅ ${count}枚のQRコードを発行しました！\nスキャン画面で動作確認できます。`);
}

function exportCSV() {
  const rows = [['QR_ID', '使用済み', '使用日時']];
  Object.entries(db).forEach(([id, v]) => {
    rows.push([id, v.used ? '済' : '未', v.usedAt || '']);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `drinkpass_${Date.now()}.csv`;
  a.click();
}

// ===== ADMIN =====
function renderAdminTable() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  const tbody = document.getElementById('adminTableBody');
  const keys = Object.keys(db).filter(id => !q || id.includes(q));

  if (keys.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="empty-state-icon">📋</div><div>${Object.keys(db).length === 0 ? '発行設定でQRを発行してください' : '該当なし'}</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = keys.slice(0, 200).map(id => {
    const v = db[id];
    return `<tr>
      <td style="font-family:'Syne',sans-serif;font-weight:700;">${id}</td>
      <td><span class="badge ${v.used ? 'badge-used' : 'badge-unused'}">${v.used ? '使用済' : '未使用'}</span></td>
      <td style="font-size:12px;color:var(--text-muted);">${v.usedAt || '—'}</td>
    </tr>`;
  }).join('');
}

function resetAll() {
  if (!confirm('全データをリセットしますか？この操作は取り消せません。')) return;
  db = {};
  scanLog = [];
  renderLog();
  updateStats();
  renderAdminTable();
  document.getElementById('previewCard').style.display = 'none';
  alert('リセットしました');
}

// ===== CAMERA =====
let cameraStream = null;
let scanInterval = null;
let barcodeDetector = null;

let debugCount = 0;
function dbg(msg) {
  const el = document.getElementById('debugOverlay');
  if (el) el.innerHTML = msg;
}

async function startCamera() {
  const wrap = document.getElementById('cameraWrap');
  const video = document.getElementById('cameraVideo');

  if (!('BarcodeDetector' in window)) {
    alert('このブラウザはQRスキャンに対応していません。\niOS17以上のSafariをお使いください。');
    return;
  }

  try {
    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    dbg('🟢 BarcodeDetector 初期化完了');
  } catch(e) {
    alert('BarcodeDetector の初期化に失敗しました。\n' + e.message);
    return;
  }

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = cameraStream;
    video.onloadedmetadata = () => {
      video.play();
      dbg(`📷 カメラ起動: ${video.videoWidth}x${video.videoHeight}`);
      scanInterval = setInterval(scanFrame, 300);
    };
    wrap.style.display = 'block';
  } catch (e) {
    alert('カメラにアクセスできませんでした。\n' + e.message);
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  clearInterval(scanInterval);
  document.getElementById('cameraWrap').style.display = 'none';
}

async function scanFrame() {
  const video = document.getElementById('cameraVideo');
  if (!video || video.readyState < 2 || video.videoWidth === 0) return;

  debugCount++;
  try {
    const codes = await barcodeDetector.detect(video);
    dbg(`🔍 スキャン #${debugCount} → ${codes.length > 0 ? '✅ 検出: ' + codes[0].rawValue : '未検出'}`);
    if (codes.length > 0) {
      document.getElementById('qrInput').value = codes[0].rawValue;
      stopCamera();
      handleScan();
    }
  } catch(e) {
    dbg(`❌ エラー: ${e.message}`);
  }
}

// ===== UTIL =====
function now() {
  return new Date().toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

updateStats();
